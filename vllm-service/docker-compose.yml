services:
  vllm-service:
    image: vllm/vllm-openai:latest
    container_name: vllm-service
    restart: unless-stopped
    env_file:
      - ./.env
    ports:
      - "${VLLM_PORT:-8400}:${VLLM_PORT:-8400}"
    volumes:
      - ../chatbot-service/models:/models
    command:
      - --model
      - ${VLLM_MODEL}
      - --host
      - ${VLLM_HOST:-0.0.0.0}
      - --port
      - ${VLLM_PORT:-8400}
      - --gpu-memory-utilization
      - ${VLLM_GPU_MEMORY_UTILIZATION:-0.9}
      - --max-model-len
      - ${VLLM_MAX_MODEL_LEN:-4096}
      - --tensor-parallel-size
      - ${VLLM_TENSOR_PARALLEL_SIZE:-1}
      - --dtype
      - ${VLLM_DTYPE:-auto}
    ipc: host
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
