version: '3.8'

services:
  ai-orchestrator:
    build: ./ai-orchestrator
    container_name: ai-orchestrator
    ports:
      - "8000:8000"
    environment:
      - DEBUG=true
      - FACE_MODE=http
      - FACE_SERVICE_URL=http://face-service:8100
      - HEALTHCARE_MODE=http
      - HEALTHCARE_SERVICE_URL=http://healthcare-service:8200
      - HEALTHCARE_HTTP_TIMEOUT_SECONDS=60
      - CHATBOT_MODE=http
      - CHATBOT_SERVICE_URL=http://chatbot-service:8300
      # You must provide these keys in .env file or environment
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - HF_TOKEN=${HF_TOKEN}
    depends_on:
      - face-service
      - healthcare-service
      - chatbot-service
    networks:
      - ai-network

  face-service:
    build: ./face-service
    container_name: face-service
    ports:
      - "8100:8100"
    environment:
      - DEBUG=true
      - PORT=8100
      - HF_TOKEN=${HF_TOKEN}
      # Model IDs
      - FACE_DETECTION_MODEL_ID=wuhp/dog-yolo
      - FACE_EMOTION_MODEL_ID=20-team-daeng-ddang-ai/dog-emotion-classification
    networks:
      - ai-network

  healthcare-service:
    build: ./healthcare-service
    container_name: healthcare-service
    ports:
      - "8200:8200"
    environment:
      - DEBUG_MODE=true
      - PORT=8200
      - HEALTH_MODEL_ID=20-team-daeng-ddang-ai/dog-pose-estimation
      - HEALTH_MODEL_FILENAME=best.pt
      - HF_TOKEN=${HF_TOKEN}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_REGION=${AWS_REGION:-ap-northeast-2}
      - S3_BUCKET_NAME=${S3_BUCKET_NAME}
      - S3_PREFIX=healthcare
    networks:
      - ai-network

  chatbot-service:
    build: ./chatbot-service
    container_name: chatbot-service
    ports:
      - "8300:8300"
    environment:
      - DEBUG=true
      - PORT=8300
      - MULTIMODAL_ENABLED=true
      - MULTIMODAL_SERVICE_URL=http://multimodal-service:8500
      - MULTIMODAL_HTTP_TIMEOUT_SECONDS=20
      - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN}
    depends_on:
      - multimodal-service
    networks:
      - ai-network

  multimodal-service:
    build: ./multimodal-service
    container_name: multimodal-service
    ports:
      - "8500:8500"
    environment:
      - DEBUG_MODE=true
      - PORT=8500
      - HF_TOKEN=${HF_TOKEN}
      - ROUTE_MODEL_ID=MobileCLIP-S1
      - ROUTE_MODEL_PRETRAINED=datacompdr
      - EYE_MODEL_ID=20-team-daeng-ddang-ai/vet-chat
      - EYE_MODEL_SUBDIR=eye_disease_classifier
      - EYE_MODEL_FILENAME=best.pt
      - EYE_RUN_CONFIG_FILENAME=run_config.json
      - SKIN_MODEL_ID=${SKIN_MODEL_ID:-}
      - SKIN_MODEL_SUBDIR=${SKIN_MODEL_SUBDIR:-skin_disease_classifier}
      - SKIN_MODEL_FILENAME=${SKIN_MODEL_FILENAME:-best.pt}
      - SKIN_RUN_CONFIG_FILENAME=${SKIN_RUN_CONFIG_FILENAME:-run_config.json}
    networks:
      - ai-network

networks:
  ai-network:
    driver: bridge
